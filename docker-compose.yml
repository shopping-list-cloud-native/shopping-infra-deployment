version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: shopping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopping_db
      POSTGRES_USER: shopping_user
      POSTGRES_PASSWORD: shopping_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - app-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: shopping-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - app-net

  io-service:
    build:
      context: ../shopping-io-service
    container_name: shopping-io-service
    restart: unless-stopped
    env_file:
      - ../shopping-io-service/.env.example
    ports:
      - "8001:8000"
    depends_on:
      - postgres
    networks:
      - app-net

  auth-service:
    build:
      context: ../shopping-auth-service
    container_name: shopping-auth-service
    restart: unless-stopped
    env_file:
      - ../shopping-auth-service/.env.example
    ports:
      - "8002:8000"
    depends_on:
      - io-service
    networks:
      - app-net

  list-manager-service:
    build:
      context: ../shopping-list-manager-service
    container_name: shopping-list-manager-service
    restart: unless-stopped
    env_file:
      - ../shopping-list-manager-service/.env.example
    ports:
      - "8003:8000"
    depends_on:
      - auth-service
      - budget-service
      - io-service
      - items-service
    networks:
      - app-net

  items-service:
    build:
      context: ../shopping-items-service
    container_name: shopping-items-service
    restart: unless-stopped
    env_file:
      - ../shopping-items-service/.env.example
    depends_on:
      - budget-service
      - io-service
    networks:
      - app-net

  budget-service:
    build:
      context: ../shopping-budget-service
    container_name: shopping-budget-service
    restart: unless-stopped
    env_file:
      - ../shopping-budget-service/.env.example
    depends_on:
      - io-service
      - notification-service
    networks:
      - app-net

  notification-service:
    build:
      context: ../shopping-notification-service
    container_name: shopping-notification-service
    restart: unless-stopped
    env_file:
      - ../shopping-notification-service/.env.example
    depends_on:
      - io-service
    networks:
      - app-net

volumes:
  postgres_data:

networks:
  app-net:
    driver: bridge
